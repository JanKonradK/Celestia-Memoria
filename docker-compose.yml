services:
  backend:
    build:
      context: ./services/ai-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./services/ai-backend/.env
    environment:
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./data:/data
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env.local
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # Optional: Ollama for local LLM (only needed with USE_LOCAL_MODE=true)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
