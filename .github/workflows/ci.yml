name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync
        working-directory: services/ai-backend

      - name: Lint (ruff)
        run: uv run ruff check .
        working-directory: services/ai-backend

      - name: Unit tests
        run: uv run pytest -m "not evaluation and not integration" --tb=short
        working-directory: services/ai-backend
        env:
          USE_LOCAL_MODE: "true"

      - name: Test coverage
        run: uv run pytest -m "not evaluation and not integration" --cov=app --cov-report=term-missing --tb=short
        working-directory: services/ai-backend
        env:
          USE_LOCAL_MODE: "true"
